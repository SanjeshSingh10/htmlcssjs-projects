<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz game</title>
</head>
<body>
    <div class="container">
        <!-- Start Screen -->
       <div class=" screen active " id="start-screen">
          <h1>Quiz Time</h1>
          <p>Test your knowledge with our fun quiz game!BY Question ..!! Good luck!</p>
          <button id="start-btn">Start Quiz</button>
       </div>
       <!-- Quiz Screen -->
       <div class="screen" id="quiz -screen">

            <!-- Quiz Header - ques  -->
            <div class ="quiz-header">
                <h2 id="question-text">Question goes here</h2>

                <!-- current question and score -->
                <div class="quiz-info">
                    <p>Question <span id="current-question">1</span> of <span >5</span></p>
                    <p>Score: <span id="score">0</span></p>
                </div>
            </div>
            
            <!--answers -->
            <div id="answers-container"  class ="answers-container">
                <!-- answer buttons will be inserted here from our js code later at some point -->
            </div>

            <div class =" progress-bar">
                <div class="progress" id="progress"></div>
            </div>
       </div>

         <!-- Result Screen -->
          
       <div class="screen" id="result-screen">
           <h1>Quiz Results</h1>
           <div class="result-info">
                <p>You scored <span id="final-score">0</span> out of <span id="max-score">5</span></p>

                <div id ="result-message"> Great job! </div>
           </div>   
           
           <button id="restart-btn">Restart Quiz</button>
       </div>

    </div>     
    
</body>
</html>
